name: ETL Google Drive

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 1-3 * *"

permissions:
  contents: read

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL
        env:
          GDRIVE_RAW_FOLDER_ID: ${{ secrets.GDRIVE_RAW_FOLDER_ID }}
          GDRIVE_PROCESSED_FOLDER_ID: ${{ secrets.GDRIVE_PROCESSED_FOLDER_ID }}
          GDRIVE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON_B64 }}
          OUTPUT_MODE: both
          REPORTS_OUTPUT_DIR: data/processed
          STATE_FILE: state/processed_files.json
          TZ: America/Caracas
        run: python -m etl.main

      - name: Upload local outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etl-output
          path: |
            data/processed
            state/processed_files.json
          if-no-files-found: ignore
