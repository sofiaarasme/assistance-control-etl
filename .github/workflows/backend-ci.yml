name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - "etl/**"
      - "requirements.txt"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "etl/**"
      - "requirements.txt"
      - ".github/workflows/backend-ci.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate imports/typing syntax
        run: python -m compileall backend etl
